</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Towsif Premium Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020205;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Particle Background */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Login Card */
        .login-box {
            position: relative;
            z-index: 10;
            width: 400px;
            padding: 40px;
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.1);
            backdrop-filter: blur(12px);
            text-align: center;
            transition: 0.3s ease;
        }

        .login-box:hover {
            border-color: #00ff9d;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.2);
        }

        /* Animated Title */
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: #00ff9d;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }

        /* Input Container */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            color: #fff;
            outline: none;
            transition: 0.4s;
        }

        .input-group input:focus, .input-group input:hover {
            border-color: #00ff9d;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
            background: rgba(0, 255, 157, 0.05);
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #00ff9d;
            color: #000;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
        }

        .login-btn:hover {
            background: #00cc7e;
            box-shadow: 0 0 20px #00ff9d;
            transform: translateY(-2px);
        }

        /* Register Link in corner */
        .register-link {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .register-link a {
            color: #00ff9d;
            text-decoration: none;
        }

        /* Error Message Notification */
        #error-box {
            position: fixed;
            bottom: 20px;
            right: -400px; /* শুরুতে বাইরে থাকবে */
            background: rgba(255, 50, 50, 0.1);
            border-left: 5px solid #ff3232;
            backdrop-filter: blur(10px);
            color: #ff3232;
            padding: 15px 25px;
            border-radius: 5px;
            font-size: 13px;
            transition: 0.5s ease-in-out;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #error-box.show {
            right: 20px;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="login-box">
        <h1 class="panel-title">Towsif PANEL</h1>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="u" placeholder="USERNAME" required>
            </div>
            <div class="input-group">
                <input type="password" id="p" placeholder="PASSWORD" required>
            </div>
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
        <div class="register-link">
            Don't have an account? <a href="#">Register here</a>
        </div>
    </div>

    <div id="error-box">
        Login failed due to incorrect password or username!
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        /* Particle Setup */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#00ff9d" },
                "shape": { "type": "edge" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff9d", "opacity": 0.1 },
                "move": { "enable": true, "speed": 1.5 }
            }
        });

        /* Login logic with Notification */
        const form = document.getElementById('loginForm');
        const errorBox = document.getElementById('error-box');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            if (user === "1" && pass === "1") {
                window.location.href = "https://www.tiktok.com/";
            } else {
                // ভুল হলে নোটিফিকেশন স্লাইড করে আসবে
                errorBox.classList.add('show');
                
                // ৫ সেকেন্ড পর আবার চলে যাবে
                setTimeout(() => {
                    errorBox.classList.remove('show');
                }, 5000);
            }
        });
    </script>
</body>
</html>
